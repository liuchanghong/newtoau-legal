<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>AusRights - Legal</title>
  <style>
    :root {
      color-scheme: light;
      --ink: #142033;
      --muted: #526173;
      --surface: #ffffff;
      --background: #f5f8fa;
      --accent: #ef6b32;
      --border: #e0e8ef;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: var(--background);
      color: var(--ink);
      font: 16px/1.55 -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
    }
    main {
      max-width: 680px;
      margin: 0 auto;
      padding: 64px 24px;
    }
    .brand {
      color: var(--accent);
      font-weight: 700;
      letter-spacing: .02em;
    }
    .card {
      margin-top: 24px;
      padding: 28px;
      border: 1px solid var(--border);
      border-radius: 18px;
      background: var(--surface);
    }
    .card + .card { margin-top: 14px; }
    h1 { margin: 12px 0 8px; font-size: clamp(32px, 5vw, 42px); line-height: 1.12; }
    p { margin: 0 0 16px; color: var(--muted); }
    a {
      color: var(--ink);
      font-weight: 600;
      text-decoration-color: var(--accent);
      text-underline-offset: 4px;
    }
  </style>
</head>
<body>
  <main>
    <div class="brand">AusRights</div>
    <h1>Legal information</h1>
    <div class="card">
      <p>Get assistance with AusRights or contact the developer.</p>
      <a href="./support/">Support</a>
    </div>
    <div class="card">
      <p>Information about how AusRights handles privacy.</p>
      <a href="./privacy/">Privacy Policy</a>
    </div>
  </main>
</body>
</html>
