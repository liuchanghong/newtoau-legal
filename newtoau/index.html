<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>NewToAU - App Support</title>
  <style>
    :root {
      color-scheme: light;
      --ink: #142033;
      --muted: #526173;
      --surface: #ffffff;
      --background: #f5f8fa;
      --accent: #2f7d77;
      --border: #e0e8ef;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: var(--background);
      color: var(--ink);
      font: 16px/1.6 -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
    }
    main {
      max-width: 760px;
      margin: 0 auto;
      padding: 64px 24px;
    }
    .brand {
      color: var(--accent);
      font-weight: 700;
      letter-spacing: .02em;
    }
    .card {
      margin-top: 18px;
      padding: 28px;
      border: 1px solid var(--border);
      border-radius: 18px;
      background: var(--surface);
    }
    h1 { margin: 12px 0 10px; font-size: clamp(32px, 5vw, 44px); line-height: 1.12; }
    p { margin: 0 0 16px; color: var(--muted); }
    a {
      color: var(--ink);
      font-weight: 650;
      text-decoration-color: var(--accent);
      text-underline-offset: 4px;
    }
  </style>
</head>
<body>
  <main>
    <div class="brand">NewToAU</div>
    <h1>App support and privacy</h1>
    <p>NewToAU provides general information for people who are new to Australia.</p>
    <div class="card">
      <p>Need help with the app or want to report an issue?</p>
      <a href="./support/">Support</a>
    </div>
    <div class="card">
      <p>Read how NewToAU handles privacy and local app data.</p>
      <a href="./privacy/">Privacy Policy</a>
    </div>
  </main>
</body>
</html>
